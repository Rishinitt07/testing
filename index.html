<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Ancient Egypt VR</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    .overlay {
      position: fixed;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-family: Arial, sans-serif;
      background: rgba(0,0,0,0.5);
      padding: 10px 15px;
      border-radius: 10px;
      z-index: 999;
    }
  </style>
</head>

<body>

<div class="overlay">
  Move phone to look around • Tap and drag to rotate
</div>

<a-scene>

  <a-assets>

    <img id="sky" src="texture/desert sky.jpg">
    <img id="sand" src="texture/sand.jpg">

    <!-- <audio id="ambience"
           src="audio/desert_ambience.mp3">
    </audio> -->

  </a-assets>

  <!-- Desert Sky -->
  <a-sky src="#sky"></a-sky>

  <!-- Ambient Audio -->
  <a-sound
      src="#ambience"
      autoplay="true"
      loop="true"
      volume="1">
  </a-sound>

  <!-- Ground -->
  <a-plane
      position="0 0 0"
      rotation="-90 0 0"
      width="1000"
      height="1000"
      material="src:#sand; repeat:100 100">
  </a-plane>

  <!-- Main Pyramid -->
  <a-entity
      gltf-model="assets/pyramid.glb"
      position="0 0 -100"
      scale="15 15 15">
  </a-entity>

  <!-- Sphinx -->
  <a-entity
      gltf-model="assets/Anubis.glb"
      position="30 0 -60"
      scale="5 5 5">
  </a-entity>

  <!-- Temple -->
  <!-- <a-entity
      gltf-model="assets/temple.glb"
      position="-50 0 -80"
      scale="8 8 8">
  </a-entity> -->

  <!-- Obelisk 1 -->
  <!-- <a-entity
      gltf-model="assets/obelisk.glb"
      position="-20 0 -30"
      scale="3 3 3">
  </a-entity> -->

  <!-- Obelisk 2 -->
  <!-- <a-entity
      gltf-model="assets/obelisk.glb"
      position="20 0 -30"
      scale="3 3 3">
  </a-entity> -->

  <!-- Sun -->
  <a-light
      type="directional"
      intensity="1.8"
      position="50 100 50">
  </a-light>

  <a-light
      type="ambient"
      intensity="0.6">
  </a-light>

  <!-- Torches -->
  <a-cylinder
      position="-10 2 -20"
      radius="0.15"
      height="4"
      color="#5e3c1b">
  </a-cylinder>

  <a-sphere
      position="-10 4.5 -20"
      radius="0.5"
      color="#ff9900"
      animation="property: scale;
                 to:1.3 1.3 1.3;
                 dir:alternate;
                 loop:true;
                 dur:400">
  </a-sphere>

  <a-cylinder
      position="10 2 -20"
      radius="0.15"
      height="4"
      color="#5e3c1b">
  </a-cylinder>

  <a-sphere
      position="10 4.5 -20"
      radius="0.5"
      color="#ff9900"
      animation="property: scale;
                 to:1.3 1.3 1.3;
                 dir:alternate;
                 loop:true;
                 dur:400">
  </a-sphere>

  <!-- Fog -->
  <a-entity
      fog="type: exponential;
           color: #f4c97a;
           density: 0.01">
  </a-entity>

  <!-- Camera -->
  <a-entity
      position="0 1.6 10"
      look-controls
      wasd-controls>
      <a-camera></a-camera>
  </a-entity>

</a-scene>

</body>
</html>
